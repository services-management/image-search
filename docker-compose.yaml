# ML Search Service Docker Compose
# Run from ml_service directory: docker-compose up -d

services:
  ml-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - MAIN_API_URL=http://host.docker.internal:8085
      - YOLO_MODEL=yolov8n.pt
      - CLIP_MODEL=openai/clip-vit-large-patch14
      - FAISS_INDEX_PATH=/app/data/faiss_index
      - USE_GPU=false
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Uncomment for GPU support
    # deploy:
    #   resources:
